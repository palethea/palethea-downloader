name: Build Desktop Installers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name != 'push' || startsWith(github.ref, 'refs/tags/') || !contains(github.event.head_commit.message, '[skip-desktop-branch-build]') }}
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Installer
            os: windows-latest
            script: desktop:pack:win
            artifact_name: palethea-windows-exe
            artifact_path: app/release/*.exe
          - name: Linux AppImage
            os: ubuntu-latest
            script: desktop:pack:linux
            artifact_name: palethea-linux-appimage
            artifact_path: app/release/*.AppImage
          - name: macOS DMG
            os: macos-latest
            script: desktop:pack:mac
            artifact_name: palethea-macos-dmg
            artifact_path: app/release/*.dmg

    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Pin npm
        run: npm install --global npm@11.6.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/native-backend

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Build desktop package
        run: npm run ${{ matrix.script }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release-assets:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload files to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.dmg
          fail_on_unmatched_files: true
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}